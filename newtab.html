<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Tab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <video class="animated-background" autoplay muted loop playsinline preload="auto" aria-hidden="true">
      <source src="assets/anime-wallpaper.mp4" type="video/mp4" />
    </video>
    <div class="background-overlay"></div>

    <main class="dashboard">
      <header class="hero card">
        <div class="hero-left">
          <p id="greeting" class="eyebrow">Good day</p>
          <h1 id="heroTitle">Hi Jay</h1>
          <div class="signal-status" aria-live="polite">
            <span id="signalSeal" class="signal-seal" aria-hidden="true">✦</span>
            <div class="signal-copy">
              <p class="signal-kicker">Signal Phase // Ambient Sync</p>
              <p id="heroStatus" class="signal-readout">Calibrating the skyline...</p>
              <p id="signalDetail" class="signal-detail">Finding the current mood layer...</p>
            </div>
          </div>
          <form id="searchForm" class="search-form">
            <input id="searchInput" type="text" placeholder="Search Google, paste a URL, check scores, start anything..." autocomplete="off" />
            <button class="button" type="submit">Search</button>
          </form>
        </div>
        <div class="hero-right">
          <p id="clock" class="clock-time">--:--</p>
          <p id="date" class="clock-date">---</p>
          <div class="hero-progress">
            <div class="progress-head">
              <p class="hero-progress-label">Day Progress</p>
              <p id="dayProgressValue" class="hero-progress-value">--%</p>
            </div>
            <div class="progress-track" aria-hidden="true">
              <span id="dayProgressBar" class="progress-fill"></span>
            </div>
            <div class="progress-head">
              <p class="hero-progress-label">Year Progress</p>
              <p id="yearProgressValue" class="hero-progress-value">--%</p>
            </div>
            <div class="progress-track progress-track-secondary" aria-hidden="true">
              <span id="yearProgressBar" class="progress-fill progress-fill-secondary"></span>
            </div>
          </div>
          <div class="timezone-row">
            <label for="timeZoneSelect">Time zone</label>
            <select id="timeZoneSelect">
              <option value="system">System default</option>
              <option value="America/Los_Angeles">Los Angeles (PT)</option>
              <option value="America/Denver">Denver (MT)</option>
              <option value="America/Chicago">Chicago (CT)</option>
              <option value="America/New_York">New York (ET)</option>
              <option value="Europe/London">London</option>
              <option value="Europe/Paris">Paris</option>
              <option value="Asia/Shanghai">Shanghai</option>
              <option value="Asia/Tokyo">Tokyo</option>
            </select>
          </div>
          <div class="hero-actions">
            <button id="modeToggle" class="button button-secondary" type="button">Toggle theme</button>
            <button id="focusToggle" class="button" type="button">Focus mode</button>
          </div>
        </div>
      </header>

      <section class="content-grid full-layout">
        <section class="card pane shortcuts-panel">
          <div class="pane-title">
            <h2>App Shortcuts</h2>
            <button id="appFormToggle" class="button button-small button-secondary" type="button" aria-expanded="false" aria-controls="appForm">
              Add shortcut
            </button>
          </div>
          <form id="appForm" class="form-grid app-form compact-add-app" hidden>
            <input id="appName" type="text" maxlength="30" placeholder="Name" required />
            <input id="appUrl" type="url" placeholder="https://example.com" required />
            <input id="appIcon" type="url" placeholder="Icon URL" />
            <button class="button" type="submit">Add</button>
          </form>
          <ul id="appGrid" class="app-grid"></ul>
        </section>

        <section class="card pane calendar-panel" aria-label="Calendar">
          <div class="pane-title">
            <h2>Calendar</h2>
            <div class="calendar-controls">
              <button id="prevMonth" class="button button-small button-secondary" type="button">Prev</button>
              <button id="nextMonth" class="button button-small button-secondary" type="button">Next</button>
            </div>
          </div>
          <p id="calendarLabel" class="calendar-label">Month Year</p>
          <div id="calendarGrid" class="calendar-grid" aria-label="Calendar days"></div>
        </section>

        <section class="card pane sports-panel">
          <div class="pane-title">
            <h2>Sports Hub</h2>
            <span class="muted">NBA, Soccer, F1</span>
          </div>
          <div class="sports-controls">
            <label><input id="toggleNba" type="checkbox" checked /> NBA</label>
            <label><input id="toggleSoccer" type="checkbox" checked /> Soccer</label>
            <label><input id="toggleF1" type="checkbox" checked /> F1</label>
            <button id="refreshSports" class="button button-small button-secondary" type="button">Refresh</button>
          </div>
          <p id="sportsMeta" class="muted">Loading latest scoreboard feed...</p>
          <div id="sportsCards" class="sports-cards"></div>
        </section>
      </section>
    </main>

    <template id="appItemTemplate">
      <li class="app-item">
        <a class="app-link" target="_blank" rel="noopener noreferrer">
          <img class="app-logo" alt="" />
          <span class="app-name"></span>
        </a>
        <button class="button button-small button-secondary app-delete" type="button">x</button>
      </li>
    </template>

    <script src="script.js"></script>
  </body>
</html>
